baseurl = "https://jorgeikeda.com"
languageCode = "es"
title = "De die in diem"
theme = "hemingway"
copyright = "&copy; <a href=\"https://github.com/freebot\">Jorge Ikeda</a> {year}"
googleAnalytics = ""
uglyurls = true

[params]
CommentoURL = "https://cdn.commento.io"

[params.highlight]
style = "github"
languages = ["go", "dockerfile"]

[[params.social]]
url = "https://github.com/freebot"
fa_icon = "fa-github"

[[params.social]]
url = "https://twitter.com/jorgeikeda"
fa_icon = "fa-twitter"

[[params.social]]
url = "/index.xml"
fa_icon = "fa-rss"

[deployment]
order = [".png$", ".jpg$", ".gif$", ".svg$"]

[[deployment.targets]]
URL = "s3://jorgeikeda.com?region=us-east-1"

[[deployment.matchers]]
# Cache static assets for 20 years.
pattern = "^.+\\.(js|css|png|jpg|gif|svg|ttf)$"
cacheControl = "max-age=630720000, no-transform, public"
gzip = true

[[deployment.matchers]]
pattern = "^.+\\.(html|xml|json)$"
gzip = true
