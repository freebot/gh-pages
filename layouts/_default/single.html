{{ partial "header" . }}
{{ partial "nav" . }}
<section class="section">
  <div class="container">
    <h2 class="subtitle is-6">{{ .Date.Format "January 2, 2006" }}</h2>
    <h1 class="title">{{ .Title }}</h1>
    <div class="content">
      {{ .Content }}
    </div>
  </div>
</section>
<section class="section">
  <div class="container">
    {{ if and .Site.Params.CommentoURL (and (not .Site.BuildDrafts) (not .Site.IsServer)) -}}
      <h2>Comentarios</h2>
      {{ partial "commento.html" . }}
    {{- end }}
  </div>
</section>
{{ partial "footer" . }}
